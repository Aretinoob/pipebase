<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Pipebase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg0:#0a0a0f;--bg1:#111118;--bg2:#16161f;--bg3:#1e1e2a;--bg4:#252534;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text0:#f0f0f8;--text1:#b8b8cc;--text2:#6e6e88;--text3:#3a3a50;--accent:#6366f1;--accent2:#4f46e5;--accent-glow:rgba(99,102,241,0.2);--accent-text:#a5b4fc;--green:#10b981;--green-dim:rgba(16,185,129,0.15);--amber:#f59e0b;--amber-dim:rgba(245,158,11,0.15);--red:#ef4444;--red-dim:rgba(239,68,68,0.15);--nav-w:220px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:var(--bg0);color:var(--text0);-webkit-font-smoothing:antialiased;}
button,input,select{font-family:inherit;}
.app{display:flex;height:100vh;overflow:hidden;}
.nav{width:var(--nav-w);flex-shrink:0;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
.scroll{flex:1;overflow-y:auto;}
.topbar{background:var(--bg1);border-bottom:1px solid var(--border);height:52px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.nav-brand{padding:1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.625rem;}
.nav-logo{width:28px;height:28px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;font-weight:800;color:#fff;flex-shrink:0;}
.nav-wordmark{font-size:0.95rem;font-weight:800;color:var(--text0);}
.nav-wordmark span{color:var(--accent-text);}
.nav-section{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);padding:0.875rem 0.875rem 0.3rem;}
.nav-item{display:flex;align-items:center;gap:0.5rem;padding:0.45rem 0.875rem;font-size:0.8rem;font-weight:500;color:var(--text2);border:none;background:none;width:100%;text-align:left;cursor:pointer;border-left:2px solid transparent;transition:all .15s;}
.nav-item:hover{color:var(--text0);background:var(--bg3);}
.nav-item.active{color:var(--accent-text);background:var(--accent-glow);border-left-color:var(--accent);}
.nav-item .ni{font-size:0.85rem;width:18px;text-align:center;flex-shrink:0;}
.nav-foot{padding:0.75rem;border-top:1px solid var(--border);margin-top:auto;}
.nav-user{display:flex;align-items:center;gap:0.5rem;}
.nav-av{width:28px;height:28px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;color:#fff;flex-shrink:0;}
.nav-name{font-size:0.78rem;font-weight:600;color:var(--text1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-logout{background:none;border:none;color:var(--text3);font-size:0.72rem;cursor:pointer;padding:4px;}
.nav-logout:hover{color:var(--text1);}
.btn{display:inline-flex;align-items:center;gap:5px;padding:0.45rem 0.875rem;border-radius:6px;font-size:0.8rem;font-weight:600;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;color:var(--text1);border:1px solid var(--border2);}.btn-ghost:hover{background:var(--bg3);color:var(--text0);}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.btn-sm{padding:0.3rem 0.65rem;font-size:0.75rem;}
.badge{display:inline-flex;align-items:center;font-size:0.68rem;font-weight:700;padding:2px 7px;border-radius:20px;}
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-amber{background:var(--amber-dim);color:var(--amber);}
.badge-gray{background:var(--bg4);color:var(--text2);border:1px solid var(--border2);}
.badge-blue{background:rgba(59,130,246,0.15);color:#60a5fa;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg4);color:var(--text0);border:1px solid var(--border2);padding:0.55rem 1rem;border-radius:6px;font-size:0.8rem;font-weight:500;z-index:300;opacity:0;transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--green);border-color:transparent;}.toast.err{background:var(--red);border-color:transparent;}
.pl{position:fixed;inset:0;background:var(--bg0);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:999;}
.spin{width:28px;height:28px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
.spin-sm{width:14px;height:14px;border-width:2px;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.page-inner{padding:2rem;max-width:1200px;}
.page-title{font-size:1.3rem;font-weight:800;letter-spacing:-0.4px;margin-bottom:0.25rem;}
.page-sub{font-size:0.82rem;color:var(--text2);}

/* STAT CARDS */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;}
.stat-num{font-size:1.75rem;font-weight:800;color:var(--text0);line-height:1;}
.stat-label{font-size:0.72rem;color:var(--text2);margin-top:0.35rem;}
.stat-delta{font-size:0.72rem;color:var(--green);margin-top:0.25rem;}

/* ARCH GRID */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.section-title{font-size:0.82rem;font-weight:700;color:var(--text0);}
.arch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem;margin-bottom:2rem;}
.arch-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;}
.arch-card:hover{border-color:rgba(99,102,241,0.3);background:var(--bg3);}
.arch-card-top{padding:1.1rem 1.25rem;display:flex;align-items:flex-start;gap:0.875rem;border-bottom:1px solid var(--border);}
.arch-icon{width:36px;height:36px;border-radius:8px;background:var(--accent-glow);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;border:1px solid rgba(99,102,241,0.2);}
.arch-name{font-size:0.875rem;font-weight:700;margin-bottom:0.2rem;}
.arch-meta{font-size:0.72rem;color:var(--text2);display:flex;gap:0.625rem;flex-wrap:wrap;align-items:center;}
.arch-actions{display:flex;gap:0.35rem;margin-left:auto;flex-shrink:0;}
.arch-card-bottom{padding:0.875rem 1.25rem;}
.layer-pills{display:flex;align-items:center;gap:0.25rem;flex-wrap:wrap;}
.layer-pill{font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:10px;border:1px solid;}
.arch-footer{font-size:0.7rem;color:var(--text2);margin-top:0.625rem;}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.75rem;padding:3.5rem;text-align:center;color:var(--text2);background:var(--bg2);border:1px dashed var(--border2);border-radius:12px;}
.empty-icon{font-size:2.5rem;opacity:0.2;}
.empty-title{font-size:0.95rem;font-weight:700;color:var(--text1);}
.empty-desc{font-size:0.8rem;max-width:32ch;}

/* RECENT ACTIVITY */
.activity-list{display:flex;flex-direction:column;gap:0;}
.activity-item{display:flex;align-items:center;gap:0.875rem;padding:0.75rem 0;border-bottom:1px solid var(--border);}
.activity-item:last-child{border-bottom:none;}
.activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.activity-text{flex:1;font-size:0.8rem;color:var(--text1);}
.activity-time{font-size:0.7rem;color:var(--text2);flex-shrink:0;}

/* ACCOUNT PANEL */
.account-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.account-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;}
.account-card-title{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--text2);margin-bottom:0.875rem;}
.plan-badge{display:inline-flex;align-items:center;gap:0.5rem;padding:0.35rem 0.875rem;border-radius:6px;font-size:0.875rem;font-weight:700;}
.plan-free{background:var(--bg4);color:var(--text1);}
.plan-starter{background:var(--blue-dim,rgba(59,130,246,0.15));color:#60a5fa;}
.plan-pro{background:var(--amber-dim);color:var(--amber);}

@media(max-width:900px){.stat-row{grid-template-columns:repeat(2,1fr);}.arch-grid{grid-template-columns:1fr;}.account-grid{grid-template-columns:1fr;}}
@media(max-width:768px){.nav{display:none;}.main{width:100%;}}
</style>
</head>
<body>
<div class="toast" id="_toast"></div>
<div class="pl" id="pl"><div class="spin"></div><div style="font-size:0.875rem;color:var(--text2)">Loading...</div></div>

<div class="app" id="app" style="display:none">
<aside class="nav">
  <div class="nav-brand"><div class="nav-logo">P</div><div class="nav-wordmark">Pipe<span>base</span></div></div>
  <div class="nav-section">Architecture</div>
  <button class="nav-item" onclick="go('architecture.html')"><span class="ni">🏛️</span>Architecture</button>
  <button class="nav-item" onclick="go('layer-editor.html')"><span class="ni">🔧</span>Layer Editor</button>
  <button class="nav-item" onclick="go('architecture-docs.html')"><span class="ni">📋</span>Docs</button>
  <button class="nav-item" onclick="go('approvals.html')"><span class="ni">✅</span>Approvals</button>
  <div class="nav-section">Platform</div>
  <button class="nav-item" onclick="go('data-viewer.html')"><span class="ni">📊</span>Data Viewer</button>
  <button class="nav-item" onclick="go('connectors.html')"><span class="ni">🔌</span>Connectors</button>
  <button class="nav-item" onclick="go('operations.html')"><span class="ni">📡</span>Operations</button>
  <button class="nav-item" onclick="go('marketplace.html')"><span class="ni">🏪</span>Marketplace</button>
  <button class="nav-item" onclick="go('team.html')"><span class="ni">👥</span>Team</button>
  <div class="nav-section">Account</div>
  <button class="nav-item active"><span class="ni">📊</span>Dashboard</button>
  <div class="nav-foot"><div class="nav-user">
    <div class="nav-av" id="navAv">?</div>
    <div class="nav-name" id="navName">...</div>
    <button class="nav-logout" onclick="logout()">↩</button>
  </div></div>
</aside>

<div class="main">
  <div class="topbar">
    <div style="font-size:0.82rem;font-weight:700">Dashboard</div>
    <button class="btn btn-primary btn-sm" onclick="go('architecture.html')">+ New architecture</button>
  </div>
  <div class="scroll">
    <div class="page-inner">

      <!-- Stats -->
      <div class="stat-row" id="statRow">
        <div class="stat-card"><div class="stat-num" id="sArch">—</div><div class="stat-label">Architectures</div></div>
        <div class="stat-card"><div class="stat-num" id="sLayers">—</div><div class="stat-label">Total layers</div></div>
        <div class="stat-card"><div class="stat-num" id="sApproved">—</div><div class="stat-label">Approved layers</div></div>
        <div class="stat-card"><div class="stat-num" id="sPending">—</div><div class="stat-label">Pending approvals</div></div>
      </div>

      <!-- Architectures -->
      <div class="section-header">
        <div class="section-title">My architectures</div>
        <button class="btn btn-ghost btn-sm" onclick="go('architecture.html')">View all →</button>
      </div>
      <div id="archGrid" class="arch-grid"></div>

      <!-- Two column: activity + account -->
      <div style="display:grid;grid-template-columns:1fr 360px;gap:1.5rem;margin-top:0.5rem">
        <div>
          <div class="section-header"><div class="section-title">Recent activity</div></div>
          <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:0.875rem 1.25rem">
            <div class="activity-list" id="activityList">
              <div style="font-size:0.8rem;color:var(--text2);text-align:center;padding:1.5rem">No recent activity</div>
            </div>
          </div>
        </div>
        <div>
          <div class="section-header"><div class="section-title">Account</div></div>
          <div class="account-grid" style="grid-template-columns:1fr">
            <div class="account-card">
              <div class="account-card-title">Current plan</div>
              <div class="plan-badge" id="planBadge">Free</div>
              <div style="margin-top:0.875rem;font-size:0.78rem;color:var(--text2)" id="planDetails">5 architectures · AI suggestions</div>
              <button class="btn btn-ghost btn-sm" style="margin-top:0.875rem;width:100%" onclick="upgradePlan()">Upgrade plan →</button>
            </div>
            <div class="account-card" style="margin-top:1rem">
              <div class="account-card-title">Quick links</div>
              <div style="display:flex;flex-direction:column;gap:0.35rem">
                <button class="btn btn-ghost btn-sm" style="justify-content:flex-start" onclick="go('connectors.html')">🔌 Manage connectors</button>
                <button class="btn btn-ghost btn-sm" style="justify-content:flex-start" onclick="go('team.html')">👥 Invite team members</button>
                <button class="btn btn-ghost btn-sm" style="justify-content:flex-start" onclick="go('marketplace.html')">🏪 Browse templates</button>
                <button class="btn btn-ghost btn-sm" style="justify-content:flex-start" onclick="go('operations.html')">📡 View operations</button>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
</div>

<script>
const API = 'https://api.pipebase.app';
let _user = null;

document.addEventListener('DOMContentLoaded', async () => {
  const token = localStorage.getItem('pb_token');
  if (!token) return go('/');
  try {
    const r = await api('/api/auth/me');
    _user = r.user;
    const name = _user.name || _user.email.split('@')[0];
    document.getElementById('navAv').textContent = name[0].toUpperCase();
    document.getElementById('navName').textContent = name;
    setPlan(_user.plan || 'free');
    await loadData();
    document.getElementById('pl').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  } catch { localStorage.removeItem('pb_token'); go('/'); }
});

async function loadData() {
  const [archRes, connRes] = await Promise.allSettled([
    api('/api/medallion'),
    api('/api/connectors'),
  ]);

  const archs = archRes.status === 'fulfilled' ? archRes.value.architectures || [] : [];
  renderArchGrid(archs);
  renderStats(archs);
  renderActivity(archs);
}

function renderStats(archs) {
  const totalLayers = archs.reduce((s,a) => s + (a.layerCount||0), 0);
  document.getElementById('sArch').textContent = archs.length;
  document.getElementById('sLayers').textContent = totalLayers;
  document.getElementById('sApproved').textContent = '—';
  document.getElementById('sPending').textContent = '—';
}

function renderArchGrid(archs) {
  const grid = document.getElementById('archGrid');
  if (!archs.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">🏛️</div>
      <div class="empty-title">No architectures yet</div>
      <div class="empty-desc">Create your first medallion architecture to get started</div>
      <button class="btn btn-primary btn-sm" onclick="go('architecture.html')">+ Create architecture</button>
    </div>`;
    return;
  }
  const govColors = {auto:'var(--green)',supervised:'#60a5fa',governed:'var(--amber)',enterprise:'#a78bfa'};
  const govLabels = {auto:'⚡ Auto',supervised:'👁 Supervised',governed:'🔐 Governed',enterprise:'🏢 Enterprise'};
  grid.innerHTML = archs.slice(0,6).map(a => `
    <div class="arch-card" onclick="go('layer-editor.html?arch=${a._id}')">
      <div class="arch-card-top">
        <div class="arch-icon">🏛️</div>
        <div style="flex:1;min-width:0">
          <div class="arch-name">${esc(a.name)}</div>
          <div class="arch-meta">
            <span>${esc(a.domain||'General')}</span>
            <span style="color:${govColors[a.governanceLevel]||'var(--text2)'};font-weight:600">${govLabels[a.governanceLevel]||''}</span>
          </div>
        </div>
        <div class="arch-actions">
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();go('layer-editor.html?arch=${a._id}')">Open</button>
          <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteArch('${a._id}')">✕</button>
        </div>
      </div>
      <div class="arch-card-bottom">
        <div style="font-size:0.72rem;color:var(--text2);margin-bottom:0.5rem">${a.layerCount||0} layers</div>
        <div class="arch-footer">Created ${ta(a.createdAt)}</div>
      </div>
    </div>`).join('');
}

function renderActivity(archs) {
  const list = document.getElementById('activityList');
  if (!archs.length) return;
  list.innerHTML = archs.slice(0,5).map(a => `
    <div class="activity-item">
      <div class="activity-dot" style="background:var(--accent)"></div>
      <div class="activity-text">Architecture <strong>${esc(a.name)}</strong> created</div>
      <div class="activity-time">${ta(a.createdAt)}</div>
    </div>`).join('');
}

async function deleteArch(id) {
  if (!confirm('Delete this architecture and all its layers?')) return;
  await api(`/api/medallion/${id}`, { method:'DELETE' });
  await loadData();
  toast('Deleted', 'ok');
}

function setPlan(plan) {
  const badge = document.getElementById('planBadge');
  const details = document.getElementById('planDetails');
  if (plan === 'pro') {
    badge.textContent = '⭐ Pro'; badge.className = 'plan-badge plan-pro';
    details.textContent = 'Unlimited architectures · All platforms · Priority AI';
  } else if (plan === 'starter') {
    badge.textContent = '🚀 Starter'; badge.className = 'plan-badge plan-starter';
    details.textContent = '25 architectures · All platforms';
  } else {
    badge.textContent = 'Free'; badge.className = 'plan-badge plan-free';
    details.textContent = '5 architectures · AI suggestions';
  }
}

async function upgradePlan() {
  try {
    const r = await api('/api/stripe/checkout', { method:'POST', body: JSON.stringify({ plan:'starter' }) });
    if (r.url) window.location.href = r.url;
  } catch(e) { toast(e.message, 'err'); }
}

async function api(path, opts={}) {
  const h = {'Content-Type':'application/json'};
  const t = localStorage.getItem('pb_token');
  if (t) h['Authorization'] = `Bearer ${t}`;
  const r = await fetch(API+path, {...opts, headers:{...h,...opts.headers}});
  const d = await r.json();
  if (!r.ok) throw new Error(d.error||'Request failed');
  return d;
}
function go(url) { window.location.href = url; }
function logout() { localStorage.removeItem('pb_token'); go('/'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ta(ts) { if(!ts)return''; const d=Date.now()-new Date(ts); const m=Math.floor(d/60000); if(m<1)return'just now'; if(m<60)return m+'m ago'; if(m<1440)return Math.floor(m/60)+'h ago'; return Math.floor(m/1440)+'d ago'; }
function toast(msg,type='') { const t=document.getElementById('_toast'); t.textContent=msg; t.className='toast'+(type?' '+type:''); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
</script>
</body>
</html>
