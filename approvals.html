<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approvals — Pipebase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0d0d14;--ink2:#3a3a4a;--ink3:#7a7a8a;--wire:#e4e4ef;--wire2:#f0f0f8;--bg:#fff;--surface:#f8f8fc;--surface2:#f2f2f8;--accent:#4338f5;--glow:rgba(67,56,245,0.12);--green:#059669;--amber:#d97706;--red:#dc2626;--sidebar-w:240px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;color:var(--ink);background:var(--surface);-webkit-font-smoothing:antialiased;}
button,input,textarea{font-family:inherit;}
.sidebar{background:#0d0d14;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);z-index:50;overflow-y:auto;}
.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--bg);border-bottom:1px solid var(--wire);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.page-content{flex:1;padding:2rem;}
.nav-top{padding:1.1rem 0.875rem 0.75rem;border-bottom:1px solid rgba(255,255,255,0.06);}
.nav-brand{display:flex;align-items:center;gap:0.5rem;}
.nav-brand-icon{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;}
.nav-brand-name{font-size:0.9rem;font-weight:800;color:#fff;}
.nav-brand-name span{color:#818cf8;}
.nav-links{flex:1;padding:0.5rem 0;}
.nav-sec{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.22);padding:0.65rem 0.875rem 0.3rem;}
.nav-btn{display:flex;align-items:center;gap:0.55rem;padding:0.45rem 0.875rem;font-size:0.8rem;font-weight:500;color:rgba(255,255,255,0.5);border:none;background:none;width:100%;text-align:left;cursor:pointer;transition:all .15s;}
.nav-btn:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.05);}
.nav-btn.active{color:#fff;background:rgba(255,255,255,0.08);border-left:2px solid #818cf8;}
.nav-btn .ic{font-size:0.85rem;width:16px;text-align:center;}
.nav-foot{padding:0.65rem 0.875rem;border-top:1px solid rgba(255,255,255,0.06);margin-top:auto;display:flex;align-items:center;gap:0.5rem;}
.nav-av{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:#fff;}
.nav-un{font-size:0.78rem;font-weight:600;color:rgba(255,255,255,0.75);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-lo{background:none;border:none;color:rgba(255,255,255,0.3);font-size:0.72rem;cursor:pointer;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:0.45rem 0.875rem;border-radius:8px;font-size:0.82rem;font-weight:600;border:none;cursor:pointer;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-secondary{background:var(--surface2);color:var(--ink);border:1px solid var(--wire);}
.btn-ghost{background:transparent;color:var(--ink2);border:1px solid var(--wire);}.btn-ghost:hover{background:var(--surface);}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{background:#047857;}
.btn-danger{background:rgba(220,38,38,0.08);color:var(--red);border:1px solid rgba(220,38,38,0.2);}
.btn-sm{padding:0.3rem 0.65rem;font-size:0.75rem;}
.badge{display:inline-flex;align-items:center;font-size:0.68rem;font-weight:700;padding:2px 7px;border-radius:20px;}
.badge-amber{background:rgba(217,119,6,0.1);color:var(--amber);}
.badge-green{background:rgba(5,150,105,0.1);color:var(--green);}
.badge-red{background:rgba(220,38,38,0.1);color:var(--red);}
.badge-gray{background:var(--surface2);color:var(--ink3);border:1px solid var(--wire);}
.spin{width:16px;height:16px;border:2px solid var(--wire);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#fff;padding:0.6rem 1.1rem;border-radius:9px;font-size:0.82rem;font-weight:500;z-index:200;opacity:0;transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--green);}.toast.error{background:var(--red);}.toast.warn{background:var(--amber);}
.pl{position:fixed;inset:0;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:999;}
.pls{width:32px;height:32px;border:3px solid var(--wire);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}

.page-header{margin-bottom:1.75rem;}
.page-header h1{font-size:1.4rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:0.35rem;}
.page-header p{font-size:0.875rem;color:var(--ink3);}
.filter-tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;border-bottom:1px solid var(--wire);padding-bottom:0.75rem;}
.filter-tab{padding:0.375rem 0.875rem;border-radius:20px;font-size:0.8rem;font-weight:600;border:1.5px solid var(--wire);cursor:pointer;transition:all .15s;background:none;color:var(--ink2);}
.filter-tab:hover{border-color:var(--accent);color:var(--accent);}
.filter-tab.active{border-color:var(--accent);background:var(--glow);color:var(--accent);}

/* APPROVAL CARD */
.approval-card{background:var(--bg);border:1.5px solid var(--wire);border-radius:12px;overflow:hidden;margin-bottom:1rem;transition:border-color .2s;}
.approval-card.pending{border-left:4px solid var(--amber);}
.approval-card.approved{border-left:4px solid var(--green);}
.approval-card.rejected{border-left:4px solid var(--red);}
.approval-header{padding:1rem 1.25rem;display:flex;align-items:center;gap:0.875rem;cursor:pointer;}
.approval-header:hover{background:var(--surface);}
.approval-layer-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.approval-info{flex:1;min-width:0;}
.approval-title{font-size:0.875rem;font-weight:700;margin-bottom:0.2rem;}
.approval-meta{font-size:0.75rem;color:var(--ink3);display:flex;gap:0.75rem;flex-wrap:wrap;}
.approval-actions{display:flex;gap:0.5rem;flex-shrink:0;}
.approval-body{border-top:1px solid var(--wire);padding:1.25rem;display:none;}
.approval-body.open{display:block;}
.code-preview{background:#1e1e2e;color:#cdd6f4;padding:1rem;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:0.75rem;line-height:1.6;overflow:auto;max-height:300px;white-space:pre;margin-top:0.75rem;}
.rules-preview{background:var(--surface);padding:0.875rem;border-radius:8px;font-size:0.82rem;color:var(--ink2);line-height:1.7;white-space:pre-wrap;margin-top:0.75rem;}
.review-form{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--wire);}
.review-textarea{width:100%;padding:0.625rem 0.875rem;border:1px solid var(--wire);border-radius:8px;font-size:0.82rem;min-height:70px;resize:vertical;background:var(--bg);}
.review-textarea:focus{outline:none;border-color:var(--accent);}
.empty-approvals{text-align:center;padding:4rem;background:var(--bg);border:1px solid var(--wire);border-radius:12px;color:var(--ink3);}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg);border-radius:14px;width:100%;max-width:520px;box-shadow:0 25px 80px rgba(0,0,0,0.2);transform:scale(0.97);transition:transform .2s;}
.modal-overlay.open .modal{transform:scale(1);}
.modal-header{padding:1rem 1.25rem;border-bottom:1px solid var(--wire);display:flex;align-items:center;justify-content:space-between;}
.modal-body{padding:1.25rem;}
.modal-footer{padding:0.875rem 1.25rem;border-top:1px solid var(--wire);display:flex;justify-content:flex-end;gap:0.5rem;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="pl" id="pl"><div class="pls"></div><div style="font-size:0.875rem;color:var(--ink3)">Loading approvals...</div></div>

<div id="appShell" style="display:none">
<aside class="sidebar">
  <div class="nav-top">
    <div class="nav-brand"><div class="nav-brand-icon">⚡</div><div class="nav-brand-name">Pipe<span>base</span></div></div>
  </div>
  <div class="nav-links">
    <div class="nav-sec">Architecture</div>
    <button class="nav-btn" onclick="go('architecture.html')"><span class="ic">🏛️</span> All Architectures</button>
    <button class="nav-btn" onclick="goEditor()"><span class="ic">🔧</span> Layer Editor</button>
    <button class="nav-btn" onclick="go('architecture-docs.html'+(archId?'?arch='+archId:''))"><span class="ic">📋</span> Documentation</button>
    <button class="nav-btn active"><span class="ic">✅</span> Approvals</button>
    <div class="nav-sec">Platform</div>
    <button class="nav-btn" onclick="go('data-viewer.html')"><span class="ic">📊</span> Data Viewer</button>
    <button class="nav-btn" onclick="go('connectors.html')"><span class="ic">🔌</span> Connectors</button>
    <button class="nav-btn" onclick="go('dashboard.html')"><span class="ic">📊</span> Dashboard</button>
  </div>
  <div class="nav-foot">
    <div class="nav-av" id="navAv">?</div>
    <div class="nav-un" id="navUn">...</div>
    <button class="nav-lo" onclick="logout()">↩</button>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:0.875rem">
      <button class="btn btn-ghost btn-sm" onclick="goEditor()">← Back to editor</button>
      <span style="font-size:0.875rem;font-weight:700" id="archLabel">Approvals</span>
    </div>
    <div style="font-size:0.8rem;color:var(--ink3)"><span id="pendingCount" style="font-weight:700;color:var(--amber)">0</span> pending</div>
  </header>

  <div class="page-content">
    <div class="page-header">
      <h1>✅ Approval Queue</h1>
      <p>Review and approve transformation changes before they deploy to your data platform.</p>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
      <button class="filter-tab" onclick="setFilter('pending',this)">⏳ Pending</button>
      <button class="filter-tab" onclick="setFilter('approved',this)">✓ Approved</button>
      <button class="filter-tab" onclick="setFilter('rejected',this)">✕ Rejected</button>
    </div>

    <div id="approvalsList"></div>
  </div>
</div>
</div>

<script>
const API = 'https://api.pipebase.app';
const params = new URLSearchParams(window.location.search);
const archId = params.get('arch');
let user = null;
let allApprovals = [];
let activeFilter = 'all';

document.addEventListener('DOMContentLoaded', async () => {
  const token = localStorage.getItem('pb_token');
  if (!token) return go('/');
  try {
    const r = await api('/api/auth/me');
    user = r.user;
    document.getElementById('navAv').textContent = (user.name||user.email)[0].toUpperCase();
    document.getElementById('navUn').textContent = user.name||user.email.split('@')[0];
    if (archId) {
      const ar = await api(`/api/medallion/${archId}`);
      document.getElementById('archLabel').textContent = ar.architecture.name + ' — Approvals';
    }
    await loadApprovals();
    document.getElementById('pl').style.display = 'none';
    document.getElementById('appShell').style.display = 'block';
  } catch { localStorage.removeItem('pb_token'); go('/'); }
});

async function loadApprovals() {
  try {
    let endpoint = archId ? `/api/medallion/${archId}/approvals` : null;
    if (!endpoint) { renderApprovals([]); return; }
    const r = await api(endpoint);
    allApprovals = r.approvals || [];
    const pending = allApprovals.filter(a=>a.status==='pending').length;
    document.getElementById('pendingCount').textContent = pending;
    renderApprovals(allApprovals);
  } catch(err) { renderApprovals([]); }
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderApprovals(allApprovals);
}

function renderApprovals(approvals) {
  const filtered = activeFilter==='all' ? approvals : approvals.filter(a=>a.status===activeFilter);
  const list = document.getElementById('approvalsList');

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-approvals">
      <div style="font-size:2rem;margin-bottom:0.75rem;opacity:0.25">✅</div>
      <div style="font-size:0.875rem;font-weight:600;color:var(--ink);margin-bottom:0.35rem">
        ${activeFilter==='pending'?'No pending approvals':'No approvals yet'}
      </div>
      <div style="font-size:0.8rem">Submit transformations from the Layer Editor to see them here</div>
    </div>`;
    return;
  }

  const statusBadge = { pending:'badge-amber', approved:'badge-green', rejected:'badge-red' };
  const statusLabel = { pending:'⏳ Pending', approved:'✓ Approved', rejected:'✕ Rejected' };
  const govLabels = { auto:'⚡ Auto', supervised:'👁 Supervised', governed:'🔐 Governed', enterprise:'🏢 Enterprise' };

  list.innerHTML = filtered.map(a => `
    <div class="approval-card ${a.status}" id="card-${a._id}">
      <div class="approval-header" onclick="toggleCard('${a._id}')">
        <div class="approval-info">
          <div class="approval-title">${esc(a.layerName)} — ${esc(a.changeType||'transformation')}</div>
          <div class="approval-meta">
            <span class="badge ${statusBadge[a.status]||'badge-gray'}">${statusLabel[a.status]||a.status}</span>
            <span>by ${esc(a.submittedBy||'')}</span>
            <span>${timeAgo(a.createdAt)}</span>
            <span>${govLabels[a.governanceLevel]||a.governanceLevel} governance</span>
            ${a.reviewedBy?`<span>Reviewed by ${esc(a.reviewedBy)}</span>`:''}
          </div>
        </div>
        ${a.status==='pending'?`
          <div class="approval-actions">
            <button class="btn btn-green btn-sm" onclick="event.stopPropagation();approveItem('${a._id}')">✓ Approve</button>
            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();rejectItem('${a._id}')">✕ Reject</button>
          </div>`:
          `<div class="approval-actions">
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();toggleCard('${a._id}')">View details</button>
          </div>`}
      </div>
      <div class="approval-body" id="body-${a._id}">
        ${a.description?`<div style="font-size:0.82rem;color:var(--ink2);margin-bottom:0.75rem">${esc(a.description)}</div>`:''}
        ${a.notes?`<div style="font-size:0.8rem;padding:0.5rem 0.75rem;background:var(--surface);border-radius:6px;margin-bottom:0.75rem;color:var(--ink2)"><strong>Review notes:</strong> ${esc(a.notes)}</div>`:''}
        ${a.businessRules?`
          <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;color:var(--ink3);margin-bottom:0.35rem">Business rules</div>
          <div class="rules-preview">${esc(a.businessRules)}</div>`:''}
        ${a.code?`
          <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;color:var(--ink3);margin-top:0.875rem;margin-bottom:0.35rem">Generated code</div>
          <div class="code-preview">${esc(a.code)}</div>`:''}
        ${a.status==='pending'?`
          <div class="review-form">
            <div style="font-size:0.8rem;font-weight:700;margin-bottom:0.5rem">Review notes (optional)</div>
            <textarea class="review-textarea" id="notes-${a._id}" placeholder="Add comments for the team..."></textarea>
            <div style="display:flex;gap:0.5rem;margin-top:0.75rem">
              <button class="btn btn-green" onclick="approveItem('${a._id}')">✓ Approve & deploy</button>
              <button class="btn btn-danger" onclick="rejectItem('${a._id}')">✕ Reject with notes</button>
            </div>
          </div>`:''}
      </div>
    </div>`).join('');
}

function toggleCard(id) {
  const body = document.getElementById('body-'+id);
  if (body) body.classList.toggle('open');
}

async function approveItem(id) {
  const notes = document.getElementById('notes-'+id)?.value || '';
  try {
    await api(`/api/medallion/${archId}/approvals/${id}`, {
      method:'PATCH', body: JSON.stringify({ status:'approved', notes })
    });
    await loadApprovals();
    toast('Approved and marked for deployment ✓', 'success');
  } catch(err) { toast('Approve failed: '+err.message, 'error'); }
}

async function rejectItem(id) {
  const notes = document.getElementById('notes-'+id)?.value || '';
  if (!notes && !confirm('Reject without notes?')) return;
  try {
    await api(`/api/medallion/${archId}/approvals/${id}`, {
      method:'PATCH', body: JSON.stringify({ status:'rejected', notes })
    });
    await loadApprovals();
    toast('Rejected', 'warn');
  } catch(err) { toast('Reject failed: '+err.message, 'error'); }
}

function goEditor(){go('layer-editor.html'+(archId?'?arch='+archId:''));}
async function api(path,opts={}){const h={'Content-Type':'application/json'};const tk=localStorage.getItem('pb_token');if(tk)h['Authorization']=`Bearer ${tk}`;const r=await fetch(API+path,{...opts,headers:{...h,...opts.headers}});const d=await r.json();if(!r.ok)throw new Error(d.error||'Request failed');return d;}
function go(url){window.location.href=url;}
function logout(){localStorage.removeItem('pb_token');go('/');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function timeAgo(ts){const d=Date.now()-new Date(ts).getTime(),m=Math.floor(d/60000);if(m<1)return'just now';if(m<60)return m+'m ago';if(m<1440)return Math.floor(m/60)+'h ago';return Math.floor(m/1440)+'d ago';}
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(type?' '+type:'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
</script>
</body>
</html>
