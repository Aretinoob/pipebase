<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Viewer — Pipebase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0d0d14;--ink2:#3a3a4a;--ink3:#7a7a8a;--ink4:#b0b0bc;--wire:#e4e4ef;--wire2:#f0f0f8;--bg:#fff;--surface:#f8f8fc;--surface2:#f2f2f8;--accent:#4338f5;--glow:rgba(67,56,245,0.12);--green:#059669;--green-bg:rgba(5,150,105,0.08);--amber:#d97706;--red:#dc2626;--nav-w:220px;--src-w:240px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;color:var(--ink);background:var(--surface);-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;}
button,input,select{font-family:inherit;}
.app{display:flex;height:100vh;overflow:hidden;}

/* NAV */
.nav{background:#0d0d14;width:var(--nav-w);flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;}
.nav-top{padding:1.1rem 0.875rem 0.75rem;border-bottom:1px solid rgba(255,255,255,0.06);}
.nav-brand{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;}
.nav-brand-icon{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;}
.nav-brand-name{font-size:0.9rem;font-weight:800;color:#fff;}
.nav-brand-name span{color:#818cf8;}
.nav-links{flex:1;padding:0.5rem 0;}
.nav-sec{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.22);padding:0.65rem 0.875rem 0.3rem;}
.nav-btn{display:flex;align-items:center;gap:0.55rem;padding:0.45rem 0.875rem;font-size:0.8rem;font-weight:500;color:rgba(255,255,255,0.5);border:none;background:none;width:100%;text-align:left;cursor:pointer;transition:all .15s;}
.nav-btn:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.05);}
.nav-btn.active{color:#fff;background:rgba(255,255,255,0.08);border-left:2px solid #818cf8;}
.nav-btn .ic{font-size:0.85rem;width:16px;text-align:center;flex-shrink:0;}
.nav-foot{padding:0.65rem 0.875rem;border-top:1px solid rgba(255,255,255,0.06);margin-top:auto;display:flex;align-items:center;gap:0.5rem;}
.nav-av{width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:#fff;flex-shrink:0;}
.nav-un{font-size:0.78rem;font-weight:600;color:rgba(255,255,255,0.75);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-lo{background:none;border:none;color:rgba(255,255,255,0.3);font-size:0.72rem;cursor:pointer;}

/* SOURCE PANEL */
.src-panel{width:var(--src-w);flex-shrink:0;background:var(--bg);border-right:1px solid var(--wire);display:flex;flex-direction:column;overflow:hidden;}
.src-hdr{padding:0.75rem 0.875rem;border-bottom:1px solid var(--wire);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.src-hdr-title{font-size:0.78rem;font-weight:700;}
.src-body{flex:1;overflow-y:auto;}
.src-sec-hdr{padding:0.45rem 0.875rem;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink3);background:var(--surface);border-bottom:1px solid var(--wire2);border-top:1px solid var(--wire2);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.src-sec-hdr:hover{background:var(--wire2);}
.src-item{padding:0.42rem 0.875rem;font-size:0.78rem;cursor:pointer;display:flex;align-items:center;gap:0.45rem;color:var(--ink2);transition:background .12s;border-left:2px solid transparent;}
.src-item:hover{background:var(--surface);}
.src-item.active{background:var(--glow);color:var(--accent);border-left-color:var(--accent);font-weight:600;}
.src-sub{padding:0.38rem 0.875rem 0.38rem 1.75rem;font-size:0.75rem;cursor:pointer;display:flex;align-items:center;gap:0.4rem;color:var(--ink3);font-family:'JetBrains Mono',monospace;border-left:2px solid transparent;transition:background .12s;}
.src-sub:hover{background:var(--surface);color:var(--ink);}
.src-sub.active{background:var(--glow);color:var(--accent);border-left-color:var(--accent);}
.src-upload{margin:0.625rem;width:calc(100% - 1.25rem);padding:0.45rem 0.75rem;border:1.5px dashed var(--wire);border-radius:7px;font-size:0.75rem;color:var(--ink3);cursor:pointer;background:none;display:flex;align-items:center;gap:0.4rem;transition:all .15s;}
.src-upload:hover{border-color:var(--accent);color:var(--accent);}
.src-empty{padding:0.75rem 0.875rem;font-size:0.75rem;color:var(--ink3);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{background:var(--bg);border-bottom:1px solid var(--wire);padding:0 1.25rem;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tabs{display:flex;border-bottom:1px solid var(--wire);background:var(--bg);flex-shrink:0;}
.tab{padding:0.7rem 1rem;font-size:0.78rem;font-weight:600;color:var(--ink3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.stats-bar{display:flex;gap:1.25rem;align-items:center;padding:0.5rem 1.25rem;background:var(--bg);border-bottom:1px solid var(--wire);flex-shrink:0;flex-wrap:wrap;}
.stat{display:flex;align-items:center;gap:0.35rem;font-size:0.75rem;}
.stat-lbl{color:var(--ink3);}
.stat-val{font-weight:700;}
.stat-val.g{color:var(--green);}
.stat-val.a{color:var(--amber);}
.toolbar{display:flex;gap:0.625rem;align-items:center;padding:0.5rem 1.25rem;background:var(--bg);border-bottom:1px solid var(--wire);flex-shrink:0;flex-wrap:wrap;}
.search{padding:0.38rem 0.75rem;border:1px solid var(--wire);border-radius:7px;font-size:0.78rem;color:var(--ink);background:var(--bg);min-width:200px;}
.search:focus{outline:none;border-color:var(--accent);}
.fsel{padding:0.38rem 0.65rem;border:1px solid var(--wire);border-radius:7px;font-size:0.75rem;color:var(--ink);background:var(--bg);cursor:pointer;}
.btn{display:inline-flex;align-items:center;gap:4px;padding:0.38rem 0.75rem;border-radius:7px;font-size:0.78rem;font-weight:600;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-pri{background:var(--accent);color:#fff;}.btn-pri:hover{background:#3730e0;}
.btn-sec{background:var(--surface2);color:var(--ink);border:1px solid var(--wire);}.btn-sec:hover{background:var(--wire2);}
.btn-ghost{background:transparent;color:var(--ink2);border:1px solid var(--wire);}.btn-ghost:hover{background:var(--surface);}
.tbl-area{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.tbl-wrap{flex:1;overflow:auto;}
.dtbl{width:100%;border-collapse:collapse;font-size:0.75rem;font-family:'JetBrains Mono',monospace;}
.dtbl th{position:sticky;top:0;z-index:10;text-align:left;padding:0.5rem 0.75rem;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink3);background:var(--surface);border-bottom:2px solid var(--wire);white-space:nowrap;cursor:pointer;user-select:none;}
.dtbl th:hover,.dtbl th.sorted{color:var(--accent);}
.dtbl td{padding:0.42rem 0.75rem;border-bottom:1px solid var(--wire2);color:var(--ink2);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dtbl tr:hover td{background:rgba(67,56,245,0.03);}
.dtbl tr:nth-child(even) td{background:var(--surface);}
.dtbl tr:nth-child(even):hover td{background:rgba(67,56,245,0.03);}
.rn{color:var(--ink4);font-size:0.68rem;text-align:right;min-width:40px;}
.cn{color:var(--green);font-weight:600;}
.cc{color:var(--accent);}
.cnull{color:var(--ink4);font-style:italic;}
.pag{display:flex;align-items:center;gap:0.4rem;padding:0.5rem 1.25rem;background:var(--bg);border-top:1px solid var(--wire);flex-shrink:0;}
.pag-info{font-size:0.75rem;color:var(--ink3);margin-right:auto;}
.pb{padding:0.28rem 0.6rem;border:1px solid var(--wire);border-radius:5px;font-size:0.75rem;background:var(--bg);cursor:pointer;color:var(--ink);}
.pb:hover{background:var(--surface);}
.pb:disabled{opacity:0.4;cursor:not-allowed;}
.pb.act{background:var(--accent);color:#fff;border-color:var(--accent);}
.diff-wrap{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;}
.diff-pane{display:flex;flex-direction:column;overflow:hidden;border-right:2px solid var(--wire);}
.diff-pane:last-child{border-right:none;}
.diff-ph{padding:0.5rem 1rem;background:var(--surface);border-bottom:1px solid var(--wire);font-size:0.78rem;font-weight:700;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.diff-scroll{flex:1;overflow:auto;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.875rem;padding:3rem;text-align:center;color:var(--ink3);}
.empty-ic{font-size:2.5rem;opacity:0.25;}
.loading{flex:1;display:flex;align-items:center;justify-content:center;gap:0.625rem;color:var(--ink3);font-size:0.875rem;}
.spin{width:20px;height:20px;border:2px solid var(--wire);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;padding:0.55rem 1rem;border-radius:8px;font-size:0.8rem;font-weight:500;z-index:200;opacity:0;transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--green);}.toast.error{background:var(--red);}.toast.warn{background:var(--amber);}
.pl{position:fixed;inset:0;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:999;}
.pls{width:32px;height:32px;border:3px solid var(--wire);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="pl" id="pl"><div class="pls"></div><div style="font-size:0.875rem;color:var(--ink3)">Loading data viewer...</div></div>
<input type="file" id="csvFile" accept=".csv" style="display:none" onchange="onCSVPick(event)">

<div class="app" id="app" style="display:none">

<!-- NAV -->
<aside class="nav">
  <div class="nav-top">
    <div class="nav-brand"><div class="nav-brand-icon">⚡</div><div class="nav-brand-name">Pipe<span>base</span></div></div>
  </div>
  <div class="nav-links">
    <div class="nav-sec">Data Viewer</div>
    <button class="nav-btn active"><span class="ic">📊</span> Data Viewer</button>
    <div class="nav-sec">Platform</div>
    <button class="nav-btn" onclick="go('pipeline-run.html')"><span class="ic">▶️</span> Live Runner</button>
    <button class="nav-btn" onclick="go('connectors.html')"><span class="ic">🔌</span> Connectors</button>
    <button class="nav-btn" onclick="go('factory.html')"><span class="ic">🏭</span> Pipeline Factory</button>
    <button class="nav-btn" onclick="go('operations.html')"><span class="ic">📡</span> Operations</button>
    <button class="nav-btn" onclick="go('marketplace.html')"><span class="ic">🏪</span> Marketplace</button>
    <button class="nav-btn" onclick="go('dashboard.html')"><span class="ic">📊</span> Dashboard</button>
  </div>
  <div class="nav-foot">
    <div class="nav-av" id="navAv">?</div>
    <div class="nav-un" id="navUn">...</div>
    <button class="nav-lo" onclick="logout()">↩</button>
  </div>
</aside>

<!-- SOURCE PANEL -->
<div class="src-panel">
  <div class="src-hdr">
    <span class="src-hdr-title">📂 Data sources</span>
    <button class="btn btn-ghost" style="padding:0.25rem 0.5rem;font-size:0.72rem" onclick="refreshAll()">↻</button>
  </div>
  <div class="src-body" id="srcBody">
    <div style="padding:1rem;font-size:0.78rem;color:var(--ink3);text-align:center">Loading...</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:0.75rem">
      <span style="font-size:0.82rem;font-weight:700" id="srcLabel">Select a source</span>
      <span id="srcTag" style="display:none;font-size:0.7rem;padding:1px 7px;border-radius:9px;background:var(--surface);border:1px solid var(--wire);color:var(--ink3)"></span>
    </div>
    <button class="btn btn-sec" onclick="exportView()" style="font-size:0.75rem;padding:0.3rem 0.7rem">⬇ Export CSV</button>
  </header>

  <div class="tabs" id="tabs" style="display:none">
    <button class="tab active" id="tab-raw" onclick="switchTab('raw')">📋 Raw</button>
    <button class="tab" id="tab-transformed" onclick="switchTab('transformed')">⚙️ Transformed</button>
    <button class="tab" id="tab-diff" onclick="switchTab('diff')">↔️ Before / After</button>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat"><span class="stat-lbl">Rows:</span><span class="stat-val" id="sRows">—</span></div>
    <div class="stat"><span class="stat-lbl">Columns:</span><span class="stat-val" id="sCols">—</span></div>
    <div class="stat"><span class="stat-lbl">Filtered:</span><span class="stat-val" id="sFiltered">—</span></div>
    <div class="stat"><span class="stat-lbl">New cols after transform:</span><span class="stat-val g" id="sNew">—</span></div>
    <div class="stat"><span class="stat-lbl">Nulls:</span><span class="stat-val a" id="sNulls">—</span></div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none">
    <input class="search" id="srch" placeholder="🔍 Search all columns..." oninput="applyFilters()">
    <select class="fsel" id="fA" onchange="applyFilters()" style="display:none"></select>
    <select class="fsel" id="fB" onchange="applyFilters()" style="display:none"></select>
  </div>

  <div class="tbl-area" id="tblArea">
    <div class="empty">
      <div class="empty-ic">📊</div>
      <div style="font-size:0.95rem;font-weight:700;color:var(--ink)">Select a data source</div>
      <div style="font-size:0.82rem;max-width:34ch">Pick a connector table or CSV file from the panel on the left.</div>
    </div>
  </div>
</div>
</div>

<script>
const API = 'https://api.pipebase.app';
let user = null;
let connectors = [];
let csvList = [];
let rawRows = [], transRows = [], filteredRows = [];
let allCols = [], transCols = [];
let tab = 'raw';
let page = 1;
const PER = 100;
let sortCol = null, sortDir = 1;
let activeSource = null;

// ── INIT ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const token = localStorage.getItem('pb_token');
  if (!token) return go('/');
  try {
    const r = await api('/api/auth/me');
    user = r.user;
    document.getElementById('navAv').textContent = (user.name||user.email)[0].toUpperCase();
    document.getElementById('navUn').textContent = user.name||user.email.split('@')[0];
    await refreshAll();
    document.getElementById('pl').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  } catch { localStorage.removeItem('pb_token'); go('/'); }
});

async function refreshAll() {
  const [cr, fr] = await Promise.allSettled([api('/api/connectors'), api('/api/connectors/csv/list')]);
  connectors = cr.status==='fulfilled' ? cr.value.connectors||[] : [];
  csvList = fr.status==='fulfilled' ? fr.value.files||[] : [];
  renderSrc();
}

// ── SOURCE PANEL ─────────────────────────────────────────────────
function renderSrc() {
  const body = document.getElementById('srcBody');
  const icons = {postgres:'🐘',mysql:'🐬',shopify:'🛍️',stripe:'💳',salesforce:'☁️',hubspot:'🟠',bigquery:'🏛️',rest_api:'🔌'};
  let h = '';

  // Connectors
  h += `<div class="src-sec-hdr" onclick="tog('sec-conn')">🔌 Connectors <span style="color:var(--ink4)">${connectors.length}</span><span id="sec-conn-ic">▾</span></div><div id="sec-conn">`;
  if (!connectors.length) {
    h += `<div class="src-empty">No connectors. <a href="connectors.html" style="color:var(--accent)">Add one →</a></div>`;
  } else {
    connectors.forEach(c => {
      const tables = c.cachedSchema?.tables || [];
      h += `<div class="src-item" onclick="togConn('${c._id}')">
        ${icons[c.type]||'🔌'} <span style="font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.name)}</span>
        <span style="font-size:0.68rem;color:${c.status==='connected'?'var(--green)':'var(--ink4)'}">${c.status==='connected'?'✓':'○'}</span>
      </div>`;
      if (tables.length) {
        h += `<div id="conn-${c._id}">`;
        tables.forEach(t => {
          const isAct = activeSource?.type==='connector' && activeSource?.cid===c._id && activeSource?.table===t.name;
          h += `<div class="src-sub ${isAct?'active':''}" onclick="loadConnTable('${c._id}','${t.name}','${esc(c.name)}','${c.type}')">
            🗂 ${esc(t.name)} <span style="margin-left:auto;color:var(--ink4);font-size:0.66rem">${t.rowCount!=null?t.rowCount.toLocaleString():''}</span>
          </div>`;
        });
        h += '</div>';
      } else {
        h += `<div style="padding:0.3rem 0.875rem 0.3rem 1.75rem;font-size:0.72rem;color:var(--ink3)"><a href="connectors.html" style="color:var(--accent)">Discover schema →</a></div>`;
      }
    });
  }
  h += '</div>';

  // CSV files
  h += `<div class="src-sec-hdr" onclick="tog('sec-csv')">📄 CSV Files <span style="color:var(--ink4)">${csvList.length}</span><span id="sec-csv-ic">▾</span></div><div id="sec-csv">`;
  if (csvList.length) {
    csvList.forEach(f => {
      const isAct = activeSource?.type==='csv' && activeSource?.filename===f.filename;
      h += `<div class="src-item ${isAct?'active':''}" onclick="loadCSV('${esc(f.filename)}')">
        📄 <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.filename)}</span>
        <span style="font-size:0.68rem;color:var(--ink4)">${f.totalRows?.toLocaleString()}</span>
      </div>`;
    });
  } else {
    h += `<div class="src-empty">No CSV files uploaded yet.</div>`;
  }
  h += `<button class="src-upload" onclick="document.getElementById('csvFile').click()">＋ Upload CSV file</button></div>`;

  body.innerHTML = h;
}

function tog(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display==='none'?'':'none';
}
function togConn(id) { tog('conn-'+id); }

// ── LOAD DATA ────────────────────────────────────────────────────
async function loadConnTable(cid, table, name, type) {
  activeSource = { type:'connector', cid, table, name, srcType:type };
  renderSrc();
  setLabel(name + ' / ' + table, type);
  showLoading();
  try {
    const r = await api(`/api/connectors/${cid}/sample`, { method:'POST', body: JSON.stringify({ table, limit:1000 }) });
    const rows = r.sample?.rows || [];
    if (!rows.length) { showEmpty('No data in this table'); return; }
    initData(rows, type);
    toast(`Loaded ${rows.length.toLocaleString()} rows from ${table}`, 'success');
  } catch(e) { showEmpty('Failed: ' + e.message); }
}

async function loadCSV(filename) {
  activeSource = { type:'csv', filename };
  renderSrc();
  setLabel(filename, 'CSV');
  showLoading();
  try {
    const r = await api(`/api/connectors/csv/rows?filename=${encodeURIComponent(filename)}`);
    if (!r.rows?.length) { showEmpty('No data'); return; }
    initData(r.rows, 'csv');
    toast(`Loaded all ${r.rows.length.toLocaleString()} rows`, 'success');
  } catch(e) { showEmpty('Failed: ' + e.message); }
}

async function onCSVPick(e) {
  const file = e.target.files[0]; if (!file) return;
  toast('Uploading ' + file.name + '...');
  const text = await file.text();
  try {
    const r = await api('/api/connectors/csv/upload', { method:'POST', body: JSON.stringify({ csvData:text, filename:file.name }) });
    toast(`Saved ${r.totalRows.toLocaleString()} rows ✓`, 'success');
    await refreshAll();
    loadCSV(file.name);
  } catch(err) { toast('Upload failed: ' + err.message, 'error'); }
  e.target.value = '';
}

// ── DATA PROCESSING ───────────────────────────────────────────────
function initData(rows, srcType) {
  rawRows = rows.map((r,i) => ({ _rn:i+1, ...r }));
  allCols = Object.keys(rows[0]||{});
  transRows = rawRows.map(r => transform(r, srcType));
  transCols = Object.keys(transRows[0]||{}).filter(c=>c!=='_rn');
  filteredRows = [...rawRows];
  tab = 'raw'; page = 1; sortCol=null;
  document.getElementById('tabs').style.display='flex';
  document.getElementById('statsBar').style.display='flex';
  document.getElementById('toolbar').style.display='flex';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-raw').classList.add('active');
  setupFilters();
  updateStats();
  render();
}

function transform(row, type) {
  const t = { ...row };
  // CSV / Netflix specific
  if (t.listed_in !== undefined) {
    const g = (t.listed_in||'').split(',').map(x=>x.trim()).filter(Boolean);
    t.primary_genre = g[0]||''; t.genre_count = g.length; delete t.listed_in;
  }
  if (t.duration !== undefined) {
    const m = (t.duration||'').match(/^(\d+)\s*(min|Season)/i);
    if (m) { t.duration_value=parseInt(m[1]); t.duration_unit=m[2].toLowerCase().startsWith('s')?'seasons':'min'; } delete t.duration;
  }
  if (t.date_added !== undefined) {
    const d=new Date(t.date_added);
    if(!isNaN(d)){t.year_added=d.getFullYear();t.month_added=d.getMonth()+1;}
  }
  if (t.release_year!==undefined) t.is_recent=parseInt(t.release_year)>=2020?'true':'false';
  if (t.director!==undefined&&(!t.director||!t.director.trim())) t.director='Unknown';
  if (t.country!==undefined&&(!t.country||!t.country.trim())) t.country='Unknown';
  if (t.cast!==undefined&&(!t.cast||!t.cast.trim())) t.cast='Unknown';
  if (t.rating) t.rating_category=['TV-MA','R','NC-17'].includes(t.rating)?'ADULT':'FAMILY';
  if (t.type) t.content_type=t.type.toUpperCase().replace(/\s+/g,'_');
  // Shopify
  if (t.financial_status) t.payment_status=t.financial_status.toUpperCase();
  if (t.total_price&&type==='shopify') t.lifetime_value=(parseFloat(t.total_price)*1.8).toFixed(2);
  // Stripe
  if (t.amount!==undefined&&type==='stripe') t.amount_usd=(t.amount/100).toFixed(2);
  // Postgres
  if (t.total_spent!==undefined&&type==='postgres') t.ltv=(parseFloat(t.total_spent||0)*1.3).toFixed(2);
  return t;
}

// ── FILTERS ──────────────────────────────────────────────────────
function setupFilters() {
  ['fA','fB'].forEach(id => { document.getElementById(id).style.display='none'; document.getElementById(id).innerHTML=''; });
  const lowCard = allCols.filter(c => {
    const u=[...new Set(rawRows.map(r=>r[c]).filter(Boolean))];
    return u.length>=2&&u.length<=60;
  }).slice(0,2);
  lowCard.forEach((col,i) => {
    const sel=document.getElementById(i===0?'fA':'fB');
    const vals=[...new Set(rawRows.map(r=>r[col]).filter(Boolean))].sort();
    sel.innerHTML=`<option value="">All ${col}</option>`+vals.map(v=>`<option>${esc(v)}</option>`).join('');
    sel.style.display='';
    sel.dataset.col=col;
  });
}

function applyFilters() {
  const q=document.getElementById('srch').value.toLowerCase();
  const fA=document.getElementById('fA'); const vA=fA.value, cA=fA.dataset.col;
  const fB=document.getElementById('fB'); const vB=fB.value, cB=fB.dataset.col;
  const src = tab==='transformed'?transRows:rawRows;
  filteredRows=src.filter(r=>{
    if(vA&&r[cA]!==vA)return false;
    if(vB&&r[cB]!==vB)return false;
    if(q&&!Object.values(r).some(v=>String(v||'').toLowerCase().includes(q)))return false;
    return true;
  });
  if(sortCol){
    filteredRows.sort((a,b)=>{const av=String(a[sortCol]||'').toLowerCase(),bv=String(b[sortCol]||'').toLowerCase();return av<bv?-sortDir:av>bv?sortDir:0;});
  }
  page=1; updateStats(); render();
}

function sortBy(col) {
  if(sortCol===col)sortDir*=-1; else{sortCol=col;sortDir=1;}
  applyFilters();
}

// ── TABS ─────────────────────────────────────────────────────────
function switchTab(t) {
  tab=t; page=1;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  filteredRows=t==='transformed'?[...transRows]:[...rawRows];
  applyFilters();
}

// ── RENDER ───────────────────────────────────────────────────────
function render() {
  if(tab==='diff'){renderDiff();return;}
  const cols=tab==='transformed'?transCols:allCols;
  const rawSet=new Set(allCols);
  const newSet=new Set(transCols.filter(c=>!rawSet.has(c)));
  const start=(page-1)*PER;
  const pageR=filteredRows.slice(start,start+PER);

  const head='<tr><th class="rn">#</th>'+cols.map(c=>`<th onclick="sortBy('${c}')" class="${sortCol===c?'sorted':''}" style="${newSet.has(c)?'color:var(--green)':''}">${c.replace(/_/g,' ')}${newSet.has(c)?' ✦':''}${sortCol===c?(sortDir>0?' ↑':' ↓'):''}</th>`).join('')+'</tr>';

  const body=pageR.map(row=>{
    const rr=tab==='transformed'?(rawRows[row._rn-1]||{}):{};
    return '<tr><td class="rn">'+row._rn+'</td>'+cols.map(c=>{
      const v=row[c],empty=v===''||v==null||v===undefined;
      const isN=newSet.has(c),chg=tab==='transformed'&&rr[c]!==undefined&&rr[c]!==v;
      return `<td class="${empty?'cnull':isN?'cn':chg?'cc':''}" title="${esc(String(v??''))}">${empty?'<em style="color:var(--ink4)">null</em>':esc(String(v))}</td>`;
    }).join('')+'</tr>';
  }).join('');

  document.getElementById('tblArea').innerHTML=`
    <div class="tbl-wrap" id="tw"><table class="dtbl"><thead>${head}</thead><tbody>${body}</tbody></table></div>
    <div class="pag" id="pag"></div>`;
  renderPag();
  document.getElementById('sFiltered').textContent=`${start+1}–${Math.min(start+PER,filteredRows.length)} of ${filteredRows.length.toLocaleString()}`;
}

function renderDiff() {
  const rc=allCols, tc=transCols;
  const rawSet=new Set(rc), newSet=new Set(tc.filter(c=>!rawSet.has(c))), remSet=new Set(rc.filter(c=>!new Set(tc).has(c)));
  const start=(page-1)*PER;
  const pageR=filteredRows.slice(start,start+PER);
  const afterR=pageR.map(r=>transRows[r._rn-1]||r);

  const mkTbl=(rows,cols,isAfter)=>{
    const h='<tr><th class="rn">#</th>'+cols.map(c=>`<th style="${newSet.has(c)?'color:var(--green)':remSet.has(c)?'color:var(--red);text-decoration:line-through':''}">${c.replace(/_/g,' ')}${newSet.has(c)?' ✦':''}</th>`).join('')+'</tr>';
    const b=rows.map((row,i)=>{
      const rr=rawRows[row._rn-1]||{};
      return '<tr><td class="rn">'+(row._rn||start+i+1)+'</td>'+cols.map(c=>{
        const v=row[c],empty=v===''||v==null||v===undefined;
        const isN=newSet.has(c),chg=isAfter&&rr[c]!==undefined&&rr[c]!==v;
        return `<td class="${empty?'cnull':isN?'cn':chg?'cc':''}" title="${esc(String(v??''))}">${empty?'<em style="color:var(--ink4)">null</em>':esc(String(v))}</td>`;
      }).join('')+'</tr>';
    }).join('');
    return `<table class="dtbl"><thead>${h}</thead><tbody>${b}</tbody></table>`;
  };

  document.getElementById('tblArea').innerHTML=`
    <div class="diff-wrap">
      <div class="diff-pane">
        <div class="diff-ph" style="color:var(--ink3)">📋 Before — ${rc.length} cols</div>
        <div class="diff-scroll" id="dL" onscroll="syncD('L')">${mkTbl(pageR,rc,false)}</div>
      </div>
      <div class="diff-pane">
        <div class="diff-ph" style="color:var(--green)">⚙️ After — ${tc.length} cols <span style="color:var(--green);font-size:0.72rem">+${newSet.size} new</span></div>
        <div class="diff-scroll" id="dR" onscroll="syncD('R')">${mkTbl(afterR,tc,true)}</div>
      </div>
    </div>
    <div class="pag" id="pag"></div>`;
  renderPag();
}

let sl=false;
function syncD(s){if(sl)return;sl=true;const L=document.getElementById('dL'),R=document.getElementById('dR');if(!L||!R){sl=false;return;}if(s==='L')R.scrollTop=L.scrollTop;else L.scrollTop=R.scrollTop;setTimeout(()=>sl=false,30);}

// ── PAGINATION ────────────────────────────────────────────────────
function renderPag() {
  const tot=Math.ceil(filteredRows.length/PER);
  const pag=document.getElementById('pag');
  if(!pag)return;
  let ps='';
  for(let i=1;i<=tot;i++){
    if(i===1||i===tot||(i>=page-2&&i<=page+2))ps+=`<button class="pb ${i===page?'act':''}" onclick="goP(${i})">${i}</button>`;
    else if(i===page-3||i===page+3)ps+='<span style="color:var(--ink4);padding:0 2px">…</span>';
  }
  pag.innerHTML=`<span class="pag-info">${filteredRows.length.toLocaleString()} rows · Page ${page}/${tot} · ${PER}/page</span>
    <button class="pb" onclick="goP(1)" ${page===1?'disabled':''}>«</button>
    <button class="pb" onclick="goP(${page-1})" ${page===1?'disabled':''}>‹</button>
    ${ps}
    <button class="pb" onclick="goP(${page+1})" ${page===tot?'disabled':''}>›</button>
    <button class="pb" onclick="goP(${tot})" ${page===tot?'disabled':''}>»</button>`;
}

function goP(p){const t=Math.ceil(filteredRows.length/PER);page=Math.max(1,Math.min(p,t));render();document.getElementById('tw')?.scrollTo(0,0);}

// ── STATS ─────────────────────────────────────────────────────────
function updateStats(){
  document.getElementById('sRows').textContent=rawRows.length.toLocaleString();
  document.getElementById('sCols').textContent=allCols.length;
  const nc=transCols.filter(c=>!new Set(allCols).has(c));
  document.getElementById('sNew').textContent='+'+nc.length;
  let nulls=0;rawRows.forEach(r=>allCols.forEach(c=>{if(!r[c]||String(r[c]).trim()==='')nulls++;}));
  document.getElementById('sNulls').textContent=nulls.toLocaleString();
}

// ── EXPORT ────────────────────────────────────────────────────────
function exportView(){
  if(!filteredRows.length){toast('No data to export','warn');return;}
  const rows=tab==='transformed'?filteredRows.map(r=>transRows[r._rn-1]||r):filteredRows;
  const cols=tab==='transformed'?transCols:allCols;
  const csv=[cols.join(','),...rows.map(r=>cols.map(c=>`"${String(r[c]||'').replace(/"/g,'""')}"`).join(','))].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`pipebase_${activeSource?.filename||activeSource?.table||'data'}_${tab}.csv`;
  a.click();
  toast('Exported '+rows.length.toLocaleString()+' rows','success');
}

// ── HELPERS ───────────────────────────────────────────────────────
function setLabel(lbl,tag){document.getElementById('srcLabel').textContent=lbl;const t=document.getElementById('srcTag');t.textContent=tag;t.style.display='';}
function showLoading(){document.getElementById('tblArea').innerHTML='<div class="loading"><div class="spin"></div>Loading data...</div>';}
function showEmpty(m){document.getElementById('tblArea').innerHTML=`<div class="empty"><div class="empty-ic">⚠️</div><div style="font-size:0.82rem;color:var(--ink)">${esc(m)}</div></div>`;}
async function api(path,opts={}){const h={'Content-Type':'application/json'};const tk=localStorage.getItem('pb_token');if(tk)h['Authorization']=`Bearer ${tk}`;const r=await fetch(API+path,{...opts,headers:{...h,...opts.headers}});const d=await r.json();if(!r.ok)throw new Error(d.error||'Request failed');return d;}
function go(url){window.location.href=url;}
function logout(){localStorage.removeItem('pb_token');go('/');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(type?' '+type:'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
</script>
</body>
