<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Viewer — Pipebase</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg0:#0a0a0f;--bg1:#111118;--bg2:#16161f;--bg3:#1e1e2a;--bg4:#252534;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text0:#f0f0f8;--text1:#b8b8cc;--text2:#6e6e88;--text3:#3a3a50;--accent:#6366f1;--accent2:#4f46e5;--accent-glow:rgba(99,102,241,0.2);--accent-text:#a5b4fc;--green:#10b981;--green-dim:rgba(16,185,129,0.15);--amber:#f59e0b;--amber-dim:rgba(245,158,11,0.15);--red:#ef4444;--red-dim:rgba(239,68,68,0.15);--blue:#3b82f6;--blue-dim:rgba(59,130,246,0.15);--purple:#8b5cf6;--purple-dim:rgba(139,92,246,0.15);--nav-w:220px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:var(--bg0);color:var(--text0);-webkit-font-smoothing:antialiased;}
button,input,textarea,select{font-family:inherit;}
.app{display:flex;height:100vh;overflow:hidden;}
.nav{width:var(--nav-w);flex-shrink:0;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
.scroll{flex:1;overflow-y:auto;}
.topbar{background:var(--bg1);border-bottom:1px solid var(--border);height:52px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.nav-brand{padding:1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.625rem;}
.nav-logo{width:28px;height:28px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;font-weight:800;color:#fff;flex-shrink:0;}
.nav-wordmark{font-size:0.95rem;font-weight:800;color:var(--text0);}
.nav-wordmark span{color:var(--accent-text);}
.nav-section{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);padding:0.875rem 0.875rem 0.3rem;}
.nav-item{display:flex;align-items:center;gap:0.5rem;padding:0.45rem 0.875rem;font-size:0.8rem;font-weight:500;color:var(--text2);border:none;background:none;width:100%;text-align:left;cursor:pointer;border-left:2px solid transparent;transition:all .15s;}
.nav-item:hover{color:var(--text0);background:var(--bg3);}
.nav-item.active{color:var(--accent-text);background:var(--accent-glow);border-left-color:var(--accent);}
.nav-item .ni{font-size:0.85rem;width:18px;text-align:center;flex-shrink:0;}
.nav-foot{padding:0.75rem;border-top:1px solid var(--border);margin-top:auto;}
.nav-user{display:flex;align-items:center;gap:0.5rem;}
.nav-av{width:28px;height:28px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;color:#fff;flex-shrink:0;}
.nav-name{font-size:0.78rem;font-weight:600;color:var(--text1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-logout{background:none;border:none;color:var(--text3);font-size:0.72rem;cursor:pointer;padding:4px;}
.nav-logout:hover{color:var(--text1);}
.btn{display:inline-flex;align-items:center;gap:5px;padding:0.45rem 0.875rem;border-radius:6px;font-size:0.8rem;font-weight:600;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;color:var(--text1);border:1px solid var(--border2);}.btn-ghost:hover{background:var(--bg3);color:var(--text0);}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{background:#059669;}
.btn-amber{background:var(--amber);color:#000;}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.btn-sm{padding:0.3rem 0.65rem;font-size:0.75rem;}
.btn:disabled{opacity:0.35;cursor:not-allowed;}
.badge{display:inline-flex;align-items:center;font-size:0.68rem;font-weight:700;padding:2px 7px;border-radius:20px;}
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-amber{background:var(--amber-dim);color:var(--amber);}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-blue{background:var(--blue-dim);color:var(--blue);}
.badge-purple{background:var(--purple-dim);color:var(--purple);}
.badge-gray{background:var(--bg4);color:var(--text2);border:1px solid var(--border2);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.card-header{padding:0.875rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:0.82rem;font-weight:700;}
.card-body{padding:1.25rem;}
.form-group{margin-bottom:1rem;}
.form-label{display:block;font-size:0.72rem;font-weight:700;color:var(--text2);margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:0.4px;}
.form-input{width:100%;padding:0.55rem 0.75rem;border:1px solid var(--border2);border-radius:6px;font-size:0.85rem;color:var(--text0);background:var(--bg3);transition:border-color .15s;}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.form-textarea{min-height:80px;resize:vertical;line-height:1.6;}
.form-hint{font-size:0.72rem;color:var(--text2);margin-top:0.25rem;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:560px;box-shadow:0 25px 80px rgba(0,0,0,0.5);transform:scale(0.97);transition:transform .2s;}
.overlay.open .modal{transform:scale(1);}
.modal-hdr{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:0.9rem;font-weight:700;}
.modal-close{background:none;border:none;font-size:1rem;color:var(--text2);cursor:pointer;padding:4px;border-radius:4px;}
.modal-close:hover{background:var(--bg4);color:var(--text0);}
.modal-body{padding:1.25rem;}
.modal-footer{padding:0.875rem 1.25rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:0.5rem;}
.tbl{width:100%;border-collapse:collapse;font-size:0.8rem;}
.tbl th{text-align:left;padding:0.5rem 0.875rem;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);background:var(--bg3);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;white-space:nowrap;}
.tbl td{padding:0.5rem 0.875rem;border-bottom:1px solid var(--border);color:var(--text1);}
.tbl tr:hover td{background:var(--bg3);}
.mono{font-family:'JetBrains Mono',monospace;font-size:0.75rem;}
.spin{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0;}
.spin-lg{width:28px;height:28px;border-width:3px;}
@keyframes spin{to{transform:rotate(360deg);}}
.pl{position:fixed;inset:0;background:var(--bg0);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:999;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg4);color:var(--text0);border:1px solid var(--border2);padding:0.55rem 1rem;border-radius:6px;font-size:0.8rem;font-weight:500;z-index:300;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--green);border-color:transparent;color:#fff;}
.toast.err{background:var(--red);border-color:transparent;color:#fff;}
.toast.warn{background:var(--amber);border-color:transparent;color:#000;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.75rem;padding:3.5rem;text-align:center;color:var(--text2);}
.empty-icon{font-size:2.5rem;opacity:0.2;}
.empty-title{font-size:0.95rem;font-weight:700;color:var(--text1);}
.empty-desc{font-size:0.8rem;max-width:34ch;}
.page-pad{padding:1.5rem;}
.page-title{font-size:1.1rem;font-weight:800;letter-spacing:-0.3px;margin-bottom:0.25rem;}
.page-sub{font-size:0.8rem;color:var(--text2);}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.875rem;}
.sec-title{font-size:0.8rem;font-weight:700;}
@media(max-width:768px){.nav{display:none;}.main{width:100%;}}
</style>

.tbl-wrap{flex:1;overflow:auto;}
.dtbl{width:100%;border-collapse:collapse;font-size:0.75rem;font-family:'JetBrains Mono',monospace;}
.dtbl th{position:sticky;top:0;z-index:10;text-align:left;padding:0.5rem 0.75rem;font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}

.rn{color:var(--text3);font-size:0.68rem;min-width:36px;text-align:right;}
.cnew{color:var(--green);font-weight:600;}
.cchg{color:var(--accent-text);}
.cnull{color:var(--text3);font-style:italic;}
.diff-wrap{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;}
.diff-pane{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);}

.diff-ph{padding:0.5rem 1rem;background:var(--bg3);border-bottom:1px solid var(--border);font-size:0.78rem;font-weight:700;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}

.pag{display:flex;align-items:center;gap:0.35rem;padding:0.5rem 1.25rem;border-top:1px solid var(--border);flex-shrink:0;}

.pb{padding:0.25rem 0.6rem;border:1px solid var(--border2);border-radius:5px;font-size:0.75rem;background:var(--bg3);cursor:pointer;color:var(--text1);}

<script>
const API='https://api.pipebase.app';
async function initUser(){
  const t=localStorage.getItem('pb_token');if(!t)return go('/');
  try{const r=await api('/api/auth/me');window._user=r.user;
    const n=r.user.name||r.user.email.split('@')[0];
    document.getElementById('navAv').textContent=n[0].toUpperCase();
    document.getElementById('navName').textContent=n;
    return r.user;
  }catch{localStorage.removeItem('pb_token');go('/');}
}
async function api(path,opts={}){
  const h={'Content-Type':'application/json'};
  const t=localStorage.getItem('pb_token');if(t)h['Authorization']=`Bearer ${t}`;
  const r=await fetch(API+path,{...opts,headers:{...h,...opts.headers}});
  const d=await r.json();if(!r.ok)throw new Error(d.error||'Request failed');return d;
}
function go(url){window.location.href=url;}
function logout(){localStorage.removeItem('pb_token');go('/');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ta(ts){if(!ts)return'';const d=Date.now()-new Date(ts);const m=Math.floor(d/60000);
  if(m<1)return'just now';if(m<60)return m+'m ago';if(m<1440)return Math.floor(m/60)+'h ago';return Math.floor(m/1440)+'d ago';}
function toast(msg,type=''){const t=document.getElementById('_t');t.textContent=msg;
  t.className='toast'+(type?' '+type:'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}
function openM(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden';}
function closeM(id){document.getElementById(id).classList.remove('open');document.body.style.overflow='';}
</script>
<script>
let conns=[],csvFiles=[],rawRows=[],transRows=[],filteredRows=[],allCols=[],transCols=[];
let vtab='raw',page=1;const PER=100;let sortCol=null,sortDir=1;let activeSource=null;

document.addEventListener('DOMContentLoaded',async()=>{
  await initUser();
  await refreshSrcs();
  document.getElementById('_pl').style.display='none';
  document.getElementById('_app').style.display='flex';
});

async function refreshSrcs(){
  const [cr,fr]=await Promise.allSettled([api('/api/connectors'),api('/api/connectors/csv/list')]);
  conns=cr.status==='fulfilled'?cr.value.connectors||[]:[];
  csvFiles=fr.status==='fulfilled'?fr.value.files||[]:[];
  renderSrcs();
}

function renderSrcs(){
  const icons={postgres:'🐘',mysql:'🐬',shopify:'🛍️',stripe:'💳',salesforce:'☁️',hubspot:'🟠',bigquery:'🏛️',rest_api:'🔌'};
  let h='<div class="src-sec">Connectors</div>';
  if(!conns.length)h+='<div style="padding:0.625rem 0.875rem;font-size:0.75rem;color:var(--text3)"><a href="connectors.html" style="color:var(--accent-text)">Add a connector →</a></div>';
  conns.forEach(c=>{
    const tables=c.cachedSchema?.tables||[];
    h+=`<div class="src-item" onclick="togConn('ct-${c._id}')">${icons[c.type]||'🔌'} <span style="font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.name)}</span></div>`;
    if(tables.length){
      h+=`<div id="ct-${c._id}">`;
      tables.forEach(t=>{
        const act=activeSource?.type==='conn'&&activeSource?.cid===c._id&&activeSource?.table===t.name;
        h+=`<div class="src-sub ${act?'active':''}" onclick="loadConn('${c._id}','${t.name}','${esc(c.name)}','${c.type}')">🗂 ${esc(t.name)}</div>`;
      });
      h+='</div>';
    }else h+=`<div style="padding:0.3rem 0.875rem 0.3rem 1.75rem;font-size:0.7rem;color:var(--text3)"><a href="connectors.html" style="color:var(--accent-text)">Discover schema →</a></div>`;
  });
  h+='<div class="src-sec">CSV Files</div>';
  csvFiles.forEach(f=>{
    const act=activeSource?.type==='csv'&&activeSource?.filename===f.filename;
    h+=`<div class="src-item ${act?'active':''}" onclick="loadCSVFile('${esc(f.filename)}')" title="${esc(f.filename)}">📄 <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.filename)}</span><span style="font-size:0.65rem;color:var(--text3)">${f.totalRows?.toLocaleString()}</span></div>`;
  });
  h+=`<div style="margin:0.625rem"><button class="btn btn-ghost btn-sm" style="width:100%" onclick="document.getElementById('csvUpload').click()">＋ Upload CSV</button><input type="file" id="csvUpload" accept=".csv" style="display:none" onchange="onCSVUp(event)"></div>`;
  document.getElementById('srcBody').innerHTML=h;
}

function togConn(id){const el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'':'none';}

async function loadConn(cid,tbl,name,type){
  activeSource={type:'conn',cid,table:tbl,name,srcType:type};renderSrcs();
  setLabel(name+' / '+tbl,type);showLoading();
  try{
    const r=await api(`/api/connectors/${cid}/sample`,{method:'POST',body:JSON.stringify({table:tbl,limit:500})});
    const rows=r.sample?.rows||[];
    if(!rows.length){showEmpty('No data in this table');return;}
    initData(rows,type);
  }catch(e){showEmpty(e.message);}
}

async function loadCSVFile(filename){
  activeSource={type:'csv',filename};renderSrcs();
  setLabel(filename,'CSV');showLoading();
  try{
    const r=await api(`/api/connectors/csv/rows?filename=${encodeURIComponent(filename)}`);
    initData(r.rows||[],'csv');
    toast(`${(r.rows||[]).length.toLocaleString()} rows loaded`,'ok');
  }catch(e){showEmpty('Upload the CSV in Connectors first. '+e.message);}
}

async function onCSVUp(e){
  const file=e.target.files[0];if(!file)return;
  toast('Uploading...');
  const text=await file.text();
  await api('/api/connectors/csv/upload',{method:'POST',body:JSON.stringify({csvData:text,filename:file.name})});
  toast('Saved!','ok');await refreshSrcs();loadCSVFile(file.name);
  e.target.value='';
}

function initData(rows,type){
  rawRows=rows.map((r,i)=>({_rn:i+1,...r}));
  allCols=Object.keys(rows[0]||{});
  transRows=rawRows.map(r=>transform(r,type));
  transCols=Object.keys(transRows[0]||{}).filter(c=>c!=='_rn');
  filteredRows=[...rawRows];vtab='raw';page=1;sortCol=null;
  document.getElementById('vtabs').style.display='flex';
  document.getElementById('vtoolbar').style.display='flex';
  document.getElementById('pag').style.display='flex';
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
  document.getElementById('vt-raw').classList.add('active');
  setupFilters();updateStats();render();
}

function transform(row,type){
  const t={...row};
  if(t.listed_in!==undefined){const g=(t.listed_in||'').split(',').map(x=>x.trim()).filter(Boolean);t.primary_genre=g[0]||'';t.genre_count=g.length;delete t.listed_in;}
  if(t.duration!==undefined){const m=(t.duration||'').match(/^(\d+)\s*(min|Season)/i);if(m){t.duration_value=parseInt(m[1]);t.duration_unit=m[2].toLowerCase().startsWith('s')?'seasons':'min';}delete t.duration;}
  if(t.date_added!==undefined){const d=new Date(t.date_added);if(!isNaN(d)){t.year_added=d.getFullYear();t.month_added=d.getMonth()+1;}}
  if(t.release_year!==undefined)t.is_recent=parseInt(t.release_year)>=2020?'true':'false';
  if(t.director!==undefined&&(!t.director||!t.director.trim()))t.director='Unknown';
  if(t.country!==undefined&&(!t.country||!t.country.trim()))t.country='Unknown';
  if(t.cast!==undefined&&(!t.cast||!t.cast.trim()))t.cast='Unknown';
  if(t.rating)t.rating_category=['TV-MA','R','NC-17'].includes(t.rating)?'ADULT':'FAMILY';
  if(t.financial_status)t.payment_status=t.financial_status.toUpperCase();
  if(t.amount!==undefined&&typeof t.amount==='number')t.amount_usd=(t.amount/100).toFixed(2);
  if(t.total_spent!==undefined)t.ltv=(parseFloat(t.total_spent||0)*1.3).toFixed(2);
  return t;
}

function setupFilters(){
  ['vfA','vfB'].forEach(id=>{document.getElementById(id).style.display='none';document.getElementById(id).innerHTML='';});
  const lowCard=allCols.filter(c=>{const u=[...new Set(rawRows.map(r=>r[c]).filter(Boolean))];return u.length>=2&&u.length<=60;}).slice(0,2);
  lowCard.forEach((col,i)=>{
    const sel=document.getElementById(i===0?'vfA':'vfB');
    const vals=[...new Set(rawRows.map(r=>r[col]).filter(Boolean))].sort();
    sel.innerHTML=`<option value="">All ${col}</option>`+vals.map(v=>`<option>${esc(v)}</option>`).join('');
    sel.style.display='';sel.dataset.col=col;
  });
}

function switchVTab(t){vtab=t;page=1;
  document.querySelectorAll('.vtab').forEach(x=>x.classList.remove('active'));
  document.getElementById('vt-'+t).classList.add('active');
  filteredRows=t==='transformed'?[...transRows]:[...rawRows];
  applyFilter();
}

function applyFilter(){
  const q=document.getElementById('vsrch').value.toLowerCase();
  const fA=document.getElementById('vfA');const fB=document.getElementById('vfB');
  const vA=fA.value,cA=fA.dataset.col,vB=fB.value,cB=fB.dataset.col;
  const src=vtab==='transformed'?transRows:rawRows;
  filteredRows=src.filter(r=>{
    if(vA&&r[cA]!==vA)return false;if(vB&&r[cB]!==vB)return false;
    if(q&&!Object.values(r).some(v=>String(v||'').toLowerCase().includes(q)))return false;
    return true;
  });
  if(sortCol)filteredRows.sort((a,b)=>{const av=String(a[sortCol]||'').toLowerCase(),bv=String(b[sortCol]||'').toLowerCase();return av<bv?-sortDir:av>bv?sortDir:0;});
  page=1;updateStats();render();
}

function sortBy(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}applyFilter();}

function render(){
  if(vtab==='diff'){renderDiff();return;}
  const cols=vtab==='transformed'?transCols:allCols;
  const rawSet=new Set(allCols),newSet=new Set(transCols.filter(c=>!rawSet.has(c)));
  const start=(page-1)*PER,pr=filteredRows.slice(start,start+PER);
  const head='<tr><th class="rn">#</th>'+cols.map(c=>`<th onclick="sortBy('${c}')" class="${sortCol===c?'sorted':''}" style="${newSet.has(c)?'color:var(--green)':''}">${c.replace(/_/g,' ')}${newSet.has(c)?' ✦':''}${sortCol===c?(sortDir>0?' ↑':' ↓'):''}</th>`).join('')+'</tr>';
  const body=pr.map(row=>{
    const rr=vtab==='transformed'?(rawRows[row._rn-1]||{}):{};
    return'<tr><td class="rn">'+row._rn+'</td>'+cols.map(c=>{
      const v=row[c],empty=v===''||v==null||v===undefined;
      const isN=newSet.has(c),chg=vtab==='transformed'&&rr[c]!==undefined&&rr[c]!==v;
      return`<td class="${empty?'cnull':isN?'cnew':chg?'cchg':''}" title="${esc(String(v??''))}">${empty?'<em>null</em>':esc(String(v))}</td>`;
    }).join('')+'</tr>';
  }).join('');
  document.getElementById('viewerContent').innerHTML=`<div class="tbl-wrap" id="tw"><table class="dtbl"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
  renderPag();
  document.getElementById('vstRows').textContent=filteredRows.length.toLocaleString()+' rows';
}

function renderDiff(){
  const rc=allCols,tc=transCols,rawSet=new Set(rc),newSet=new Set(tc.filter(c=>!rawSet.has(c)));
  const start=(page-1)*PER,pr=filteredRows.slice(start,start+PER),ar=pr.map(r=>transRows[r._rn-1]||r);
  const mkTbl=(rows,cols,isAfter)=>`<table class="dtbl"><thead><tr><th class="rn">#</th>${cols.map(c=>`<th style="${newSet.has(c)?'color:var(--green)':''}">${c.replace(/_/g,' ')}${newSet.has(c)?' ✦':''}</th>`).join('')}</tr></thead><tbody>${rows.map((row,i)=>{const rr=rawRows[row._rn-1]||{};return'<tr><td class="rn">'+(row._rn||start+i+1)+'</td>'+cols.map(c=>{const v=row[c],empty=v===''||v==null||v===undefined;const isN=newSet.has(c),chg=isAfter&&rr[c]!==undefined&&rr[c]!==v;return`<td class="${empty?'cnull':isN?'cnew':chg?'cchg':''}" title="${esc(String(v??''))}">${empty?'<em>null</em>':esc(String(v))}</td>`;}).join('')+'</tr>';}).join('')}</tbody></table>`;
  let sl=false;
  document.getElementById('viewerContent').innerHTML=`<div class="diff-wrap"><div class="diff-pane"><div class="diff-ph" style="color:var(--text2)">📋 Before <span style="font-size:0.7rem">${rc.length} cols</span></div><div class="diff-scroll" id="dL" onscroll="if(!sl){sl=true;document.getElementById('dR').scrollTop=this.scrollTop;setTimeout(()=>sl=false,30)}">${mkTbl(pr,rc,false)}</div></div><div class="diff-pane"><div class="diff-ph" style="color:var(--green)">⚙️ After <span style="font-size:0.7rem">+${newSet.size} new cols</span></div><div class="diff-scroll" id="dR" onscroll="if(!sl){sl=true;document.getElementById('dL').scrollTop=this.scrollTop;setTimeout(()=>sl=false,30)}">${mkTbl(ar,tc,true)}</div></div></div>`;
  renderPag();
}

function renderPag(){
  const tot=Math.ceil(filteredRows.length/PER),p=document.getElementById('pag');if(!p)return;
  let ps='';for(let i=1;i<=tot;i++){if(i===1||i===tot||(i>=page-2&&i<=page+2))ps+=`<button class="pb ${i===page?'act':''}" onclick="goP(${i})">${i}</button>`;else if(i===page-3||i===page+3)ps+='<span style="color:var(--text3);padding:0 2px">…</span>';}
  p.innerHTML=`<span class="pag-info">${filteredRows.length.toLocaleString()} rows · Page ${page}/${tot}</span><button class="pb" onclick="goP(1)" ${page===1?'disabled':''}>«</button><button class="pb" onclick="goP(${page-1})" ${page===1?'disabled':''}>‹</button>${ps}<button class="pb" onclick="goP(${page+1})" ${page===tot?'disabled':''}>›</button><button class="pb" onclick="goP(${tot})" ${page===tot?'disabled':''}>»</button>`;
}
function goP(p){const t=Math.ceil(filteredRows.length/PER);page=Math.max(1,Math.min(p,t));render();document.getElementById('tw')?.scrollTo(0,0);}

function updateStats(){
  document.getElementById('vstRows').textContent=rawRows.length.toLocaleString()+' rows';
  document.getElementById('vstCols').textContent=allCols.length+' cols';
  const nc=transCols.filter(c=>!new Set(allCols).has(c));
  document.getElementById('vstNew').textContent='+'+nc.length+' after transform';
}

function setLabel(lbl,tag){document.getElementById('srcLabel').textContent=lbl;const t=document.getElementById('srcTag');t.textContent=tag;t.style.display='';}
function showLoading(){document.getElementById('viewerContent').innerHTML='<div class="empty"><div class="spin spin-lg"></div><div style="color:var(--text2)">Loading data...</div></div>';}
function showEmpty(m){document.getElementById('viewerContent').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">${esc(m)}</div></div>`;}

function exportView(){
  if(!filteredRows.length){toast('No data','warn');return;}
  const rows=vtab==='transformed'?filteredRows.map(r=>transRows[r._rn-1]||r):filteredRows;
  const cols=vtab==='transformed'?transCols:allCols;
  const csv=[cols.join(','),...rows.map(r=>cols.map(c=>`"${String(r[c]||'').replace(/"/g,'""')}"`).join(','))].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`pipebase_${activeSource?.filename||activeSource?.table||'data'}_${vtab}.csv`;a.click();
  toast('Exported '+rows.length.toLocaleString()+' rows','ok');
}
</script>
</body>
